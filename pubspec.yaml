name: bhumi_survey
description: ভূমি সার্ভে অফিস ম্যানেজমেন্ট অ্যাপ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase - Cloud Backend
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10

  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  animations: ^2.0.8
  lottie: ^2.7.0

  # State Management
  provider: ^6.1.1
  get: ^4.6.6

  # Local Storage (Offline support)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  permission_handler: ^11.1.0
  flutter_local_notifications: ^16.3.0
  share_plus: ^7.2.2
  pdf: ^3.10.8
  printing: ^5.11.3
  fl_chart: ^0.66.2
  table_calendar: ^3.0.9
  flutter_slidable: ^3.0.1
  quickalert: ^1.1.0
  flutter_animate: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
